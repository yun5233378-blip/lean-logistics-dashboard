  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useMemo, useState } = React;

      const fmt = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 1 });
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const pct = (value) => `${Math.round(value)}%`;

      const colors = {
        normal: "#4edea3",
        warn: "#ffb95f",
        bad: "#ff7886",
        muted: "#bbcabf"
      };

      const stages = [
        { id: "domestic", name: "国内仓出库", short: "国内仓", icon: "warehouse", target: 10, base: 8.8, wait: 2.2, value: 6.4, capacity: 760, demand: 640, cycle: 48, cv: 0.16, baseWip: 420 },
        { id: "head", name: "头程运输", short: "头程", icon: "flight_takeoff", target: 88, base: 82, wait: 14, value: 68, capacity: 530, demand: 476, cycle: 72, cv: 0.21, baseWip: 690 },
        { id: "customs", name: "清关查验", short: "清关", icon: "fact_check", target: 20, base: 18, wait: 6.5, value: 6.2, capacity: 480, demand: 452, cycle: 78, cv: 0.28, baseWip: 560 },
        { id: "overseas", name: "海外仓上架", short: "海外仓", icon: "inventory_2", target: 22, base: 26, wait: 15, value: 8.5, capacity: 380, demand: 426, cycle: 108, cv: 0.36, baseWip: 880 },
        { id: "lastmile", name: "尾程妥投", short: "尾程", icon: "local_shipping", target: 40, base: 35, wait: 7.8, value: 18, capacity: 620, demand: 510, cycle: 62, cv: 0.24, baseWip: 530 }
      ];

      const anomalies = {
        none: {
          id: "none",
          name: "正常运行",
          short: "基线",
          node: null,
          icon: "check_circle",
          summary: "链路保持稳定，海外仓仍是当前约束节点。",
          multipliers: {},
          waits: {},
          cv: {},
          wip: {},
          route: {}
        },
        customs: {
          id: "customs",
          name: "清关罢工",
          short: "清关",
          node: "customs",
          icon: "gavel",
          summary: "清关处理能力下降，查验等待显著拉长，系统约束转移至清关查验。",
          multipliers: { customs: 2.15, head: 1.12 },
          waits: { customs: 19, head: 5 },
          cv: { customs: 0.27 },
          wip: { customs: 980, head: 360 },
          route: { customs: 2.4, air: 0.7 }
        },
        warehouse: {
          id: "warehouse",
          name: "海外仓爆仓",
          short: "爆仓",
          node: "overseas",
          icon: "inventory",
          summary: "海外仓上架能力不足，拆柜区积压扩大，建议切换备用仓并增加夜班。",
          multipliers: { overseas: 2.35, customs: 1.08 },
          waits: { overseas: 28 },
          cv: { overseas: 0.34 },
          wip: { overseas: 1260, customs: 260 },
          route: { warehouse: 2.9, lastmile: 0.6 }
        },
        port: {
          id: "port",
          name: "港口拥堵",
          short: "港口",
          node: "head",
          icon: "anchor",
          summary: "头程海运等待上升，低成本路线失去时效优势，系统建议改走空运或铁路中转。",
          multipliers: { head: 1.72 },
          waits: { head: 42 },
          cv: { head: 0.26 },
          wip: { head: 1120 },
          route: { sea: 4.8, port: 3.2 }
        },
        lastmile: {
          id: "lastmile",
          name: "尾程派送延迟",
          short: "尾程",
          node: "lastmile",
          icon: "package_2",
          summary: "尾程派送网络承压，妥投时效被拉长，建议切换区域承运商并提升预约波次。",
          multipliers: { lastmile: 1.85 },
          waits: { lastmile: 18 },
          cv: { lastmile: 0.28 },
          wip: { lastmile: 740 },
          route: { lastmile: 1.8, express: 0.4 }
        }
      };

      const channelProfiles = {
        全部渠道: { lead: 1, cost: 1, cv: 0 },
        空运: { lead: 0.78, cost: 1.34, cv: -0.03 },
        海运: { lead: 1.28, cost: 0.72, cv: 0.07 },
        快递: { lead: 0.7, cost: 1.58, cv: -0.01 }
      };

      const countryProfiles = {
        全部目的地: { lead: 1, risk: 0 },
        美国: { lead: 1.05, risk: 0.04 },
        德国: { lead: 0.96, risk: 0.02 },
        英国: { lead: 1.02, risk: 0.03 },
        日本: { lead: 0.82, risk: -0.02 }
      };

      const baseRoutes = [
        { from: "深圳工厂", to: "香港机场", carrier: "顺丰空运", time: 0.4, cost: 180, tag: "air" },
        { from: "香港机场", to: "美西清关", carrier: "国泰货运", time: 2.2, cost: 330, tag: "air" },
        { from: "美西清关", to: "美东海外仓", carrier: "联邦快线", time: 2.8, cost: 230, tag: "lastmile" },
        { from: "深圳工厂", to: "盐田港", carrier: "集卡干线", time: 0.6, cost: 45, tag: "sea" },
        { from: "盐田港", to: "洛杉矶港", carrier: "马士基海运", time: 9.8, cost: 180, tag: "sea" },
        { from: "洛杉矶港", to: "美西清关", carrier: "港口转运", time: 1.2, cost: 65, tag: "port" },
        { from: "洛杉矶港", to: "备用海外仓", carrier: "临时保税仓", time: 1.5, cost: 95, tag: "warehouse" },
        { from: "备用海外仓", to: "美东海外仓", carrier: "跨州卡车", time: 3.7, cost: 175, tag: "lastmile" },
        { from: "香港机场", to: "芝加哥中转", carrier: "极兔国际", time: 2.7, cost: 350, tag: "express" },
        { from: "芝加哥中转", to: "美东海外仓", carrier: "区域快运", time: 2.1, cost: 190, tag: "lastmile" },
        { from: "深圳工厂", to: "铁路口岸", carrier: "中欧班列", time: 5.2, cost: 130, tag: "rail" },
        { from: "铁路口岸", to: "美东海外仓", carrier: "多式联运", time: 5.4, cost: 260, tag: "lastmile" }
      ];

      const navItems = [
        { id: "overview", label: "总览驾驶舱", icon: "dashboard" },
        { id: "leadtime", label: "时效分析", icon: "timer" },
        { id: "bottleneck", label: "瓶颈诊断", icon: "analytics" },
        { id: "routes", label: "路径优化", icon: "route" },
        { id: "exceptions", label: "异常模拟", icon: "warning" },
        { id: "batches", label: "批次明细", icon: "list_alt" }
      ];

      function buildStageMetrics(anomalyId, channel, country) {
        const anomaly = anomalies[anomalyId];
        const channelFactor = channelProfiles[channel] || channelProfiles["全部渠道"];
        const countryFactor = countryProfiles[country] || countryProfiles["全部目的地"];
        const demandFactor = anomalyId === "none" ? 1 : 1.08;

        const rows = stages.map((stage) => {
          const multiplier = anomaly.multipliers[stage.id] || 1;
          const lead = (stage.base * multiplier + (anomaly.waits[stage.id] || 0)) * channelFactor.lead * countryFactor.lead;
          const wait = (stage.wait + (anomaly.waits[stage.id] || 0)) * Math.max(0.7, channelFactor.lead);
          const value = stage.value * Math.min(1.08, channelFactor.lead);
          const cv = clamp(stage.cv + channelFactor.cv + countryFactor.risk + (anomaly.cv[stage.id] || 0), 0.08, 0.86);
          const demand = Math.round(stage.demand * demandFactor * (anomaly.node === stage.id ? 1.24 : 1));
          const load = demand / stage.capacity;
          const takt = 28800 / demand;
          const cycle = stage.cycle * (anomaly.multipliers[stage.id] || 1) + (anomaly.waits[stage.id] || 0) * 1.8;
          const wip = Math.round(stage.baseWip + (anomaly.wip[stage.id] || 0) + (load > 1 ? (load - 1) * 900 : 0));
          const score = cycle / takt * 0.5 + cv / 0.42 * 0.25 + load * 0.25;

          return {
            ...stage,
            lead,
            wait,
            value,
            cv,
            demand,
            load,
            takt,
            cycle,
            wip,
            score
          };
        });

        const bottleneck = rows.reduce((max, row) => row.score > max.score ? row : max, rows[0]);
        return rows.map((row) => ({
          ...row,
          status: row.id === bottleneck.id ? "瓶颈" : row.score > 1.05 || row.load > 0.96 || row.cv > 0.38 ? "预警" : "正常"
        }));
      }

      function buildRoutes(anomalyId, maxDays) {
        const anomaly = anomalies[anomalyId];
        const adjusted = baseRoutes.map((edge) => {
          const extra = anomaly.route[edge.tag] || 0;
          const nodeExtra = edge.to === "美西清关" ? (anomaly.route.customs || 0) : 0;
          return {
            ...edge,
            time: edge.time + extra + nodeExtra,
            cost: Math.round(edge.cost * (1 + (extra > 0 ? 0.06 : 0)))
          };
        });

        const graph = adjusted.reduce((acc, edge) => {
          if (!acc[edge.from]) acc[edge.from] = [];
          acc[edge.from].push(edge);
          return acc;
        }, {});

        const paths = [];
        const visit = (node, route, seen) => {
          if (node === "美东海外仓") {
            const time = route.reduce((sum, edge) => sum + edge.time, 0);
            const cost = route.reduce((sum, edge) => sum + edge.cost, 0);
            const carriers = [...new Set(route.map((edge) => edge.carrier))];
            paths.push({ nodes: ["深圳工厂", ...route.map((edge) => edge.to)], route, time, cost, carriers });
            return;
          }
          (graph[node] || []).forEach((edge) => {
            if (!seen.has(edge.to)) {
              visit(edge.to, [...route, edge], new Set([...seen, edge.to]));
            }
          });
        };

        visit("深圳工厂", [], new Set(["深圳工厂"]));

        const fastest = [...paths].sort((a, b) => a.time - b.time)[0];
        const cheapest = [...paths].sort((a, b) => a.cost - b.cost)[0];
        const feasible = paths.filter((path) => path.time <= maxDays).sort((a, b) => a.cost - b.cost || a.time - b.time);
        const best = feasible[0] || fastest;
        const fallback = feasible.length === 0;
        const maxCost = Math.max(...paths.map((path) => path.cost));
        const maxTime = Math.max(...paths.map((path) => path.time));
        const minCost = Math.min(...paths.map((path) => path.cost));
        const minTime = Math.min(...paths.map((path) => path.time));
        const recommended = [...paths].sort((a, b) => {
          const scoreA = (a.cost - minCost) / (maxCost - minCost || 1) * 0.45 + (a.time - minTime) / (maxTime - minTime || 1) * 0.4 + (a.time > maxDays ? 0.6 : 0);
          const scoreB = (b.cost - minCost) / (maxCost - minCost || 1) * 0.45 + (b.time - minTime) / (maxTime - minTime || 1) * 0.4 + (b.time > maxDays ? 0.6 : 0);
          return scoreA - scoreB;
        })[0];

        return { paths, best, fastest, cheapest, recommended, feasibleCount: feasible.length, fallback };
      }

      function buildBatches(metrics, anomalyId) {
        const anomaly = anomalies[anomalyId];
        const channels = ["空运", "海运", "快递"];
        const countries = ["美国", "德国", "英国", "日本"];
        const currentNodes = metrics.map((stage) => stage.short);
        return Array.from({ length: 34 }).map((_, index) => {
          const stage = metrics[(index * 2 + (anomaly.node ? 2 : 0)) % metrics.length];
          const drift = Math.sin(index * 1.7) * 0.12 + (stage.status === "瓶颈" ? 0.32 : stage.status === "预警" ? 0.16 : 0);
          const riskScore = clamp(34 + stage.cv * 80 + stage.load * 18 + drift * 50, 18, 96);
          const risk = riskScore >= 76 ? "高风险" : riskScore >= 58 ? "中风险" : "低风险";
          const usedHours = metrics.slice(0, (index % metrics.length) + 1).reduce((sum, item) => sum + item.lead, 0) * (0.76 + (index % 5) * 0.07);
          return {
            id: `LL-${String(2600 + index).padStart(4, "0")}`,
            channel: channels[index % channels.length],
            country: countries[(index + 1) % countries.length],
            node: currentNodes[(index + (stage.status === "瓶颈" ? 1 : 0)) % currentNodes.length],
            elapsed: usedHours / 24,
            eta: 3 + (index % 8) + (risk === "高风险" ? 3 : risk === "中风险" ? 1 : 0),
            risk,
            riskScore,
            issue: risk === "高风险" ? `${stage.short}积压` : risk === "中风险" ? "时效波动" : "正常推进"
          };
        });
      }

      function useModel(anomalyId, channel, country, maxDays) {
        return useMemo(() => {
          const metrics = buildStageMetrics(anomalyId, channel, country);
          const totalHours = metrics.reduce((sum, stage) => sum + stage.lead, 0);
          const waitHours = metrics.reduce((sum, stage) => sum + stage.wait, 0);
          const valueHours = metrics.reduce((sum, stage) => sum + stage.value, 0);
          const bottleneck = metrics.find((stage) => stage.status === "瓶颈");
          const batches = buildBatches(metrics, anomalyId);
          const routes = buildRoutes(anomalyId, maxDays);
          const highRisk = batches.filter((batch) => batch.risk === "高风险").length;
          const warnRisk = batches.filter((batch) => batch.risk !== "低风险").length;
          return {
            metrics,
            totalDays: totalHours / 24,
            waitHours,
            varRatio: valueHours / totalHours * 100,
            bottleneck,
            batches,
            highRisk,
            warnRisk,
            routes
          };
        }, [anomalyId, channel, country, maxDays]);
      }

      function Icon({ name, className = "" }) {
        return <span className={`material-symbols-outlined ${className}`}>{name}</span>;
      }

      function StatusBadge({ status }) {
        const cls = status === "瓶颈" || status === "高风险" ? "status-bad" : status === "预警" || status === "中风险" ? "status-warn" : "status-normal";
        return <span className={`inline-flex items-center gap-1 rounded-full border px-2 py-1 text-xs font-bold ${cls}`}><span className="status-dot" style={{ background: status === "瓶颈" || status === "高风险" ? colors.bad : status === "预警" || status === "中风险" ? colors.warn : colors.normal }} />{status}</span>;
      }

      function MetricCard({ title, value, suffix, tone = "normal", icon, hint, onClick }) {
        const color = tone === "bad" ? colors.bad : tone === "warn" ? colors.warn : colors.normal;
        return (

                <p className="micro">{title}</p>
                <div className="mt-2 flex items-baseline gap-1">

      function Sidebar({ page, setPage, anomalyId }) {
        return (
          <aside className="sidebar">

                </div>
                <div>

            <nav className="flex-1 px-3">

                <Icon name={anomalies[anomalyId].icon} className={anomalyId === "none" ? "text-emerald" : "text-rose"} />

      function Header({ page, channel, setChannel, country, setCountry, anomalyId, setPage, reset }) {

              <h2 className="text-xl font-black">{current.label}</h2>

            <div className="flex flex-wrap items-center justify-end gap-3">
              <select value={channel} onChange={(event) => setChannel(event.target.value)} className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text">

              <select value={country} onChange={(event) => setCountry(event.target.value)} className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text">

      function ProcessFlow({ metrics, compact = false }) {
        const maxLead = Math.max(...metrics.map((item) => item.lead));
        return (
          <div className={`grid gap-3 ${compact ? "grid-cols-1" : "grid-cols-1 xl:grid-cols-5"}`}>
            {metrics.map((stage, index) => {
              const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
              return (
                <div key={stage.id} className="card relative overflow-hidden p-4">
                  <div className="flex items-center justify-between">
                    <span className="grid h-9 w-9 place-items-center rounded-md" style={{ background: `${color}1f`, color }}><Icon name={stage.icon} /></span>
                    <StatusBadge status={stage.status} />
                  </div>
                  <h3 className="mt-4 font-black">{stage.name}</h3>
                  <p className="micro mt-1">平均耗时 {fmt.format(stage.lead)} 小时</p>
                  <div className="mt-4 bar-track">
                    <div className="bar-fill" style={{ "--w": pct(stage.lead / maxLead * 100), "--c": color }} />
                  </div>
                  <div className="mt-3 grid grid-cols-2 gap-2 text-xs text-muted">
                    <span>等待 {fmt.format(stage.wait)}h</span>
                    <span>积压 {stage.wip}件</span>
                  </div>
                  {!compact && index < metrics.length - 1 && <div className="absolute right-[-10px] top-1/2 hidden h-5 w-5 rotate-45 border-r border-t border-outline bg-surface-card xl:block" />}
                </div>
              );
            })}
          </div>
        );
      }

      function Radar({ metrics }) {
        const bottleneck = metrics.find((item) => item.status === "瓶颈");
        const values = [
          clamp(bottleneck.lead / bottleneck.target * 42, 12, 88),
          clamp(bottleneck.load * 64, 18, 92),
          clamp(bottleneck.cv * 125, 16, 90),
          clamp(bottleneck.wip / 16, 20, 94)
        ];
        const points = values.map((value, index) => {
          const angle = Math.PI / 2 + index * Math.PI / 2;
          const radius = value * 0.78;
          return [100 + Math.cos(angle) * radius, 100 - Math.sin(angle) * radius];
        }).map((point) => point.join(",")).join(" ");

        return (
          <svg viewBox="0 0 200 200" className="h-64 w-full">
            {[30, 55, 80].map((r) => <polygon key={r} points={`100,${100 - r} ${100 + r},100 100,${100 + r} ${100 - r},100`} fill="none" stroke="#3c4a42" strokeDasharray="4 5" />)}
            <line x1="100" y1="20" x2="100" y2="180" stroke="#3c4a42" />
            <line x1="20" y1="100" x2="180" y2="100" stroke="#3c4a42" />
            <polygon points={points} fill="rgba(255,120,134,0.22)" stroke="#ff7886" strokeWidth="3" />
            {points.split(" ").map((point) => {
              const [x, y] = point.split(",");
              return <circle key={point} cx={x} cy={y} r="4" fill="#ffb2b7" />;
            })}
            <text x="100" y="14" fill="#bbcabf" fontSize="10" textAnchor="middle">时效</text>
            <text x="187" y="103" fill="#bbcabf" fontSize="10" textAnchor="end">负荷</text>
            <text x="100" y="195" fill="#bbcabf" fontSize="10" textAnchor="middle">波动</text>
            <text x="14" y="103" fill="#bbcabf" fontSize="10">积压</text>
          </svg>
        );
      }

      function Funnel({ metrics }) {
        const max = Math.max(...metrics.map((item) => item.lead));
        const widths = metrics.map((item) => 48 + item.lead / max * 46);
        return (
          <div className="space-y-3">
            {metrics.map((stage, index) => {
              const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
              return (
                <div key={stage.id} className="grid grid-cols-[120px_1fr_90px] items-center gap-3">
                  <div className="flex items-center gap-2 text-sm font-bold"><Icon name={stage.icon} className="text-muted" />{stage.short}</div>
                  <div className="h-10 rounded-md border border-outline bg-surface-lowest p-1">
                    <div className="flex h-full items-center justify-between rounded px-3 text-xs font-bold text-[#07101f]" style={{ width: `${widths[index]}%`, background: color }}>
                      <span>{fmt.format(stage.lead)} 小时</span>
                      <span>{fmt.format(stage.lead / 24)} 天</span>
                    </div>
                  </div>
                  <StatusBadge status={stage.status} />
                </div>
              );
            })}
          </div>
        );
      }

      function WipBars({ metrics }) {
        const max = Math.max(...metrics.map((item) => item.wip));
        return (
          <div className="flex h-56 items-end gap-4 border-b border-l border-outline px-4 pt-5">

              return (
                <div key={stage.id} className="flex flex-1 flex-col items-center gap-2">
                  <span className="mono text-xs" style={{ color }}>{stage.wip}</span>
                  <div className="w-full rounded-t-md" style={{ height: `${stage.wip / max * 170}px`, background: color }} />

        return (

              <div>
                <p className="micro">{title}</p>

              </div>
              {active && <span className={`rounded-full border px-2 py-1 text-xs font-black ${fallback ? "status-warn" : "status-normal"}`}>{fallback ? "兜底路线" : "推荐路线"}</span>}
            </div>
            <div className="mt-4 grid grid-cols-3 gap-3">
              <div className="rounded-md bg-surface-lowest p-3">

                <p className="mono text-lg font-black text-emerald">{fmt.format(route.time)} 天</p>
              </div>
              <div className="rounded-md bg-surface-lowest p-3">

          </div>

      function RouteGraph({ route }) {
        const nodes = route?.nodes || ["深圳工厂", "香港机场", "美西清关", "美东海外仓"];
        const xGap = 520 / Math.max(1, nodes.length - 1);
        return (
          <svg viewBox="0 0 600 170" className="h-48 w-full rounded-md bg-surface-lowest">
            <defs>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L8,4 L0,8 z" fill="#4edea3" />
              </marker>
            </defs>
            <path d={nodes.map((_, i) => `${i === 0 ? "M" : "L"} ${40 + i * xGap} ${85 + (i % 2 ? -28 : 22)}`).join(" ")} fill="none" stroke="#4edea3" strokeWidth="3" markerEnd="url(#arrow)" />
            {nodes.map((node, index) => {
              const x = 40 + index * xGap;
              const y = 85 + (index % 2 ? -28 : 22);
              return (
                <g key={node}>
                  <circle cx={x} cy={y} r="18" fill="#151b2d" stroke="#4edea3" strokeWidth="2" />
                  <text x={x} y={y + 42} fill="#dce1fb" fontSize="12" textAnchor="middle">{node}</text>
                </g>
              );
            })}
          </svg>
        );
      }

      function TocTable({ metrics }) {
        return (
          <div className="overflow-auto">
            <table className="soft-table w-full min-w-[840px] text-left text-sm">
              <thead className="bg-surface-lowest text-muted">
                <tr>

              <tbody>

                  return (
                    <tr key={stage.id}>
                      <td className="px-4 py-3 font-bold"><span className="inline-flex items-center gap-2"><Icon name={stage.icon} className="text-muted" />{stage.name}</span></td>

      function Overview({ model, setPage, anomalyId }) {

                  {anomalies[anomalyId].summary}
                  建议先保护瓶颈节点产能，再调整前序放行节奏。
                </p>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">推荐物流路线</h3>
                <div className="mt-4 rounded-md bg-surface-lowest p-4">

                </div>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">异常态势</h3>
                <div className="mt-4 space-y-3">
                  {model.metrics.filter((item) => item.status !== "正常").map((item) => (
                    <div key={item.id} className="flex items-center justify-between rounded-md bg-surface-lowest px-3 py-2">
                      <span className="text-sm font-bold">{item.name}</span>
                      <StatusBadge status={item.status} />
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </div>
        );
      }

      function LeadTimePage({ model }) {
        return (
          <div className="page-pad space-y-5">
            <section className="grid grid-cols-1 gap-4 xl:grid-cols-4">
              <MetricCard title="全链路交期" value={fmt.format(model.totalDays)} suffix="天" icon="schedule" hint="含等待时间" tone={model.totalDays > 9 ? "bad" : "normal"} />
              <MetricCard title="平均等待时间" value={fmt.format(model.waitHours)} suffix="小时" icon="hourglass" hint="非增值耗时" tone={model.waitHours > 56 ? "warn" : "normal"} />
              <MetricCard title="增值时间比率" value={fmt.format(model.varRatio)} suffix="%" icon="functions" hint="运输与处理占比" tone={model.varRatio < 34 ? "warn" : "normal"} />
              <MetricCard title="波动最高节点" value={model.metrics.reduce((a, b) => a.cv > b.cv ? a : b).short} icon="monitoring" hint="按变异系数排序" tone="warn" />
            </section>
            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1fr_0.82fr]">

            </section>

                <WipBars metrics={model.metrics} />
              </div>
              <div className="card p-5">
                <h3 className="panel-title">节点稳定性</h3>
                <div className="mt-5 grid grid-cols-1 gap-4 md:grid-cols-2">
                  {model.metrics.map((stage) => (
                    <div key={stage.id} className="rounded-md bg-surface-lowest p-4">
                      <div className="mb-3 flex items-center justify-between"><span className="font-bold">{stage.name}</span><StatusBadge status={stage.status} /></div>
                      <div className="space-y-3">
                        <div><div className="mb-1 flex justify-between text-xs text-muted"><span>变异系数</span><span>{fmt.format(stage.cv * 100)}%</span></div><div className="bar-track"><div className="bar-fill" style={{ "--w": pct(stage.cv * 120), "--c": stage.status === "瓶颈" ? colors.bad : colors.warn }} /></div></div>
                        <div><div className="mb-1 flex justify-between text-xs text-muted"><span>负荷率</span><span>{fmt.format(stage.load * 100)}%</span></div><div className="bar-track"><div className="bar-fill" style={{ "--w": pct(clamp(stage.load * 100, 0, 120)), "--c": stage.status === "瓶颈" ? colors.bad : colors.normal }} /></div></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </div>
        );
      }

      function RoutesPage({ model, maxDays, setMaxDays }) {
        const { best, fastest, cheapest, recommended, fallback } = model.routes;
        return (
          <div className="page-pad space-y-5">
            <section className="card p-5">
              <div className="flex flex-wrap items-center justify-between gap-4">
                <div>
                  <h3 className="panel-title">期望交期约束</h3>
                  <p className="micro">系统实时寻找满足交期约束下的最低成本路线</p>
                </div>
                <div className="mono text-3xl font-black text-emerald">{fmt.format(maxDays)} 天</div>
              </div>
              <input className="range mt-5 w-full" type="range" min="4" max="16" step="0.2" value={maxDays} onChange={(event) => setMaxDays(Number(event.target.value))} />
              {fallback && <div className="mt-4 rounded-md border border-amber/50 bg-amber/10 p-3 text-sm text-amber">当前约束下无成本可行解，系统已自动切换为最快可达路线。</div>}
            </section>
            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1fr_0.95fr]">
              <div className="card p-5">
                <h3 className="panel-title">推荐路径拓扑</h3>
                <div className="mt-4"><RouteGraph route={best} /></div>
              </div>
              <div className="space-y-4">
                <RouteCard title={fallback ? "兜底执行路线" : "当前推荐路线"} route={best} active fallback={fallback} />
                <RouteCard title="成本最低路线" route={cheapest} active={cheapest === best && !fallback} />
              </div>
            </section>
            <section className="grid grid-cols-1 gap-4 xl:grid-cols-3">
              <RouteCard title="时效最快路线" route={fastest} active={fallback && fastest === best} fallback={fallback} />
              <RouteCard title="综合评分路线" route={recommended} active={!fallback && recommended === best} />
              <div className="card p-4">
                <p className="micro">可行路线数量</p>
                <p className="mono mt-2 text-3xl font-black text-emerald">{model.routes.feasibleCount}</p>
                <p className="mt-3 text-sm text-muted">在当前约束和异常影响下，系统已完成所有简单路径枚举并按成本排序。</p>
              </div>
            </section>
          </div>
        );
      }

      function ExceptionsPage({ anomalyId, inject, reset, model }) {
        const beforeDays = buildStageMetrics("none", "全部渠道", "全部目的地").reduce((sum, item) => sum + item.lead, 0) / 24;
        return (
          <div className="page-pad space-y-5">
            <section className="grid grid-cols-1 gap-5 xl:grid-cols-[0.8fr_1.2fr]">
              <div className="card p-5">
                <h3 className="panel-title">压力测试与异常注入</h3>
                <p className="micro mt-1">选择事件后，全局指标、瓶颈节点和路径推荐会同步变化</p>
                <div className="mt-5 grid grid-cols-1 gap-3">
                  {Object.values(anomalies).filter((item) => item.id !== "none").map((item) => (
                    <button key={item.id} onClick={() => inject(item.id)} className={`flex items-center justify-between rounded-md border p-4 text-left transition ${anomalyId === item.id ? "border-rose bg-rose/10" : "border-outline bg-surface-lowest hover:border-emerald"}`}>
                      <span className="flex items-center gap-3"><Icon name={item.icon} className={anomalyId === item.id ? "text-rose" : "text-muted"} /><span className="font-black">{item.name}</span></span>
                      <span className="text-xs text-muted">注入</span>
                    </button>
                  ))}
                </div>
                <button className="btn mt-5 w-full" onClick={reset}><Icon name="restart_alt" />恢复基线</button>
              </div>
              <div className="card grid-bg p-5">
                <div className="flex flex-wrap items-center justify-between gap-4">
                  <div>
                    <h3 className="panel-title">异常前后对比</h3>
                    <p className="micro">当前事件：{anomalies[anomalyId].name}</p>
                  </div>
                  <StatusBadge status={anomalyId === "none" ? "正常" : "瓶颈"} />
                </div>
                <div className="mt-5 grid grid-cols-1 gap-4 md:grid-cols-3">
                  <div className="card p-4"><p className="micro">基线交期</p><p className="mono mt-2 text-3xl font-black text-emerald">{fmt.format(beforeDays)} 天</p></div>
                  <div className="card p-4"><p className="micro">当前交期</p><p className="mono mt-2 text-3xl font-black text-rose">{fmt.format(model.totalDays)} 天</p></div>
                  <div className="card p-4"><p className="micro">瓶颈节点</p><p className="mt-2 text-3xl font-black text-amber">{model.bottleneck.short}</p></div>
                </div>
                <div className="mt-5"><ProcessFlow metrics={model.metrics} compact /></div>
              </div>
            </section>
          </div>
        );
      }

      function BatchesPage({ model }) {
        const [risk, setRisk] = useState("全部风险");
        const [query, setQuery] = useState("");
        const filtered = model.batches.filter((batch) => (risk === "全部风险" || batch.risk === risk) && (query.trim() === "" || batch.id.includes(query.trim()) || batch.node.includes(query.trim())));
        return (
          <div className="page-pad space-y-5">
            <section className="card p-5">
              <div className="flex flex-wrap items-center justify-between gap-4">
                <div>
                  <h3 className="panel-title">批次明细</h3>
                  <p className="micro">共 {filtered.length} 个批次，按风险等级和当前节点筛选</p>
                </div>
                <div className="flex gap-3">
                  <input value={query} onChange={(event) => setQuery(event.target.value)} placeholder="搜索批次或节点" className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                  <select value={risk} onChange={(event) => setRisk(event.target.value)} className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text">
                    {["全部风险", "高风险", "中风险", "低风险"].map((item) => <option key={item}>{item}</option>)}
                  </select>
                </div>
              </div>
              <div className="mt-5 overflow-auto">
                <table className="soft-table w-full min-w-[980px] text-left text-sm">
                  <thead className="bg-surface-lowest text-muted">
                    <tr><th className="px-4 py-3">批次号</th><th className="px-4 py-3">渠道</th><th className="px-4 py-3">目的地</th><th className="px-4 py-3">当前节点</th><th className="px-4 py-3">已耗时</th><th className="px-4 py-3">预计妥投</th><th className="px-4 py-3">风险等级</th><th className="px-4 py-3">异常原因</th></tr>
                  </thead>
                  <tbody>
                    {filtered.map((batch) => (
                      <tr key={batch.id}>
                        <td className="mono px-4 py-3 font-black">{batch.id}</td>
                        <td className="px-4 py-3">{batch.channel}</td>
                        <td className="px-4 py-3">{batch.country}</td>
                        <td className="px-4 py-3">{batch.node}</td>
                        <td className="mono px-4 py-3">{fmt.format(batch.elapsed)} 天</td>
                        <td className="mono px-4 py-3">{fmt.format(batch.eta)} 天后</td>
                        <td className="px-4 py-3"><StatusBadge status={batch.risk} /></td>
                        <td className="px-4 py-3 text-muted">{batch.issue}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        );
      }

      function App() {
        const [page, setPage] = useState("overview");
        const [channel, setChannel] = useState("全部渠道");
        const [country, setCountry] = useState("全部目的地");
        const [anomalyId, setAnomalyId] = useState("none");
        const [maxDays, setMaxDays] = useState(8);
        const [toast, setToast] = useState("");
        const model = useModel(anomalyId, channel, country, maxDays);

        const inject = (id) => {
          setAnomalyId(id);
          setToast(`${anomalies[id].name}已注入，诊断模型正在联动更新`);
          window.clearTimeout(window.__toastTimer);
          window.__toastTimer = window.setTimeout(() => setToast(""), 2400);
        };

        const reset = () => {
          setAnomalyId("none");
          setToast("已恢复基线场景");
          window.clearTimeout(window.__toastTimer);
          window.__toastTimer = window.setTimeout(() => setToast(""), 1800);
        };

        return (
          <div className="app-shell">
            <Sidebar page={page} setPage={setPage} anomalyId={anomalyId} />
            <div className="main-area">
              <Header page={page} channel={channel} setChannel={setChannel} country={country} setCountry={setCountry} anomalyId={anomalyId} setPage={setPage} reset={reset} />
              <main>
                {page === "overview" && <Overview model={model} setPage={setPage} anomalyId={anomalyId} />}
                {page === "leadtime" && <LeadTimePage model={model} />}
                {page === "bottleneck" && <BottleneckPage model={model} />}
                {page === "routes" && <RoutesPage model={model} maxDays={maxDays} setMaxDays={setMaxDays} />}
                {page === "exceptions" && <ExceptionsPage anomalyId={anomalyId} inject={inject} reset={reset} model={model} />}
                {page === "batches" && <BatchesPage model={model} />}
              </main>
            </div>
            {toast && <div className="toast"><div className="flex items-center gap-2"><Icon name={anomalyId === "none" ? "check_circle" : "warning"} /><span className="font-bold">{toast}</span></div></div>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
