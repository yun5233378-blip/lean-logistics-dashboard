<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>精益物流决策看板</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#0c1324",
              surface: "#0c1324",
              "surface-lowest": "#070d1f",
              "surface-low": "#151b2d",
              "surface-card": "#191f31",
              "surface-high": "#23293c",
              "surface-highest": "#2e3447",
              text: "#dce1fb",
              muted: "#bbcabf",
              outline: "#3c4a42",
              emerald: "#4edea3",
              emerald2: "#10b981",
              amber: "#ffb95f",
              amber2: "#ee9800",
              rose: "#ff7886",
              rose2: "#ffb2b7"
            },
            fontFamily: {
              sans: ["Inter", "Microsoft YaHei", "PingFang SC", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      :root {
        --bg: #0c1324;
        --surface-lowest: #070d1f;
        --surface-low: #151b2d;
        --surface-card: #191f31;
        --surface-high: #23293c;
        --surface-highest: #2e3447;
        --text: #dce1fb;
        --muted: #bbcabf;
        --outline: #3c4a42;
        --emerald: #4edea3;
        --emerald-strong: #10b981;
        --amber: #ffb95f;
        --amber-strong: #ee9800;
        --rose: #ff7886;
        --rose-soft: #ffb2b7;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, rgba(78, 222, 163, 0.08), transparent 26%),
          linear-gradient(180deg, #0c1324 0%, #070d1f 100%);
        font-family: Inter, "Microsoft YaHei", "PingFang SC", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .material-symbols-outlined {
        font-family: "Material Symbols Outlined";
        font-weight: normal;
        font-style: normal;
        font-size: 20px;
        line-height: 1;
        display: inline-block;
        text-transform: none;
        white-space: nowrap;
        direction: ltr;
        font-feature-settings: "liga";
        -webkit-font-feature-settings: "liga";
        -webkit-font-smoothing: antialiased;
        font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 264px minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        background: rgba(21, 27, 45, 0.96);
        border-right: 1px solid rgba(60, 74, 66, 0.78);
        display: flex;
        flex-direction: column;
        z-index: 20;
      }

      .main-area {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        min-height: 76px;
        background: rgba(12, 19, 36, 0.86);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(60, 74, 66, 0.72);
      }

      .page-pad {
        padding: 24px;
      }

      .card {
        background: rgba(25, 31, 49, 0.82);
        border: 1px solid rgba(60, 74, 66, 0.72);
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .card-hover {
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      .card-hover:hover {
        background: rgba(35, 41, 60, 0.9);
        border-color: rgba(78, 222, 163, 0.55);
        transform: translateY(-1px);
      }

      .panel-title {
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
      }

      .micro {
        font-size: 12px;
        color: var(--muted);
      }

      .mono {
        font-variant-numeric: tabular-nums;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 38px;
        padding: 0 14px;
        border-radius: 6px;
        border: 1px solid rgba(60, 74, 66, 0.9);
        background: rgba(35, 41, 60, 0.72);
        color: var(--text);
        transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      }

      .btn:hover {
        border-color: rgba(78, 222, 163, 0.7);
        background: rgba(46, 52, 71, 0.96);
      }

      .btn-primary {
        color: #003824;
        background: var(--emerald);
        border-color: var(--emerald);
        font-weight: 800;
      }

      .btn-danger {
        color: #40000d;
        background: var(--rose);
        border-color: var(--rose);
        font-weight: 800;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }

      .status-normal {
        color: var(--emerald);
        background: rgba(78, 222, 163, 0.1);
        border-color: rgba(78, 222, 163, 0.38);
      }

      .status-warn {
        color: var(--amber);
        background: rgba(255, 185, 95, 0.1);
        border-color: rgba(255, 185, 95, 0.42);
      }

      .status-bad {
        color: var(--rose-soft);
        background: rgba(255, 120, 134, 0.12);
        border-color: rgba(255, 120, 134, 0.56);
      }

      .soft-table th,
      .soft-table td {
        border-bottom: 1px solid rgba(60, 74, 66, 0.56);
      }

      .soft-table tbody tr:hover {
        background: rgba(35, 41, 60, 0.58);
      }

      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .bar-track {
        height: 8px;
        border-radius: 999px;
        background: rgba(7, 13, 31, 0.8);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        width: var(--w);
        border-radius: inherit;
        background: var(--c);
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 60;
        border: 1px solid rgba(255, 120, 134, 0.46);
        background: rgba(147, 0, 10, 0.82);
        color: #ffdad6;
        border-radius: 8px;
        padding: 14px 16px;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.36);
      }

      .grid-bg {
        background-image:
          linear-gradient(rgba(60, 74, 66, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(60, 74, 66, 0.18) 1px, transparent 1px);
        background-size: 22px 22px;
      }

      .range {
        accent-color: var(--emerald);
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: #2e3447;
        border-radius: 999px;
      }

      @media (max-width: 980px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: relative;
          height: auto;
        }

        .page-pad {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const fmt = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 1 });
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const pct = (value) => `${Math.round(value)}%`;

      const colors = {
        normal: "#4edea3",
        warn: "#ffb95f",
        bad: "#ff7886",
        muted: "#bbcabf"
      };

      const stages = [
        { id: "domestic", name: "国内仓出库", short: "国内仓", icon: "warehouse", target: 10, base: 8.8, wait: 2.2, value: 6.4, capacity: 760, demand: 640, cycle: 48, cv: 0.16, baseWip: 420 },
        { id: "head", name: "头程运输", short: "头程", icon: "flight_takeoff", target: 88, base: 82, wait: 14, value: 68, capacity: 530, demand: 476, cycle: 72, cv: 0.21, baseWip: 690 },
        { id: "customs", name: "清关查验", short: "清关", icon: "fact_check", target: 20, base: 18, wait: 6.5, value: 6.2, capacity: 480, demand: 452, cycle: 78, cv: 0.28, baseWip: 560 },
        { id: "overseas", name: "海外仓上架", short: "海外仓", icon: "inventory_2", target: 22, base: 26, wait: 15, value: 8.5, capacity: 380, demand: 426, cycle: 108, cv: 0.36, baseWip: 880 },
        { id: "lastmile", name: "尾程妥投", short: "尾程", icon: "local_shipping", target: 40, base: 35, wait: 7.8, value: 18, capacity: 620, demand: 510, cycle: 62, cv: 0.24, baseWip: 530 }
      ];

      const anomalies = {
        none: {
          id: "none",
          name: "正常运行",
          short: "基线",
          node: null,
          icon: "check_circle",
          summary: "链路保持稳定，海外仓仍是当前约束节点。",
          multipliers: {},
          waits: {},
          cv: {},
          wip: {},
          route: {}
        },
        customs: {
          id: "customs",
          name: "清关罢工",
          short: "清关",
          node: "customs",
          icon: "gavel",
          summary: "清关处理能力下降，查验等待显著拉长，系统约束转移至清关查验。",
          multipliers: { customs: 2.15, head: 1.12 },
          waits: { customs: 19, head: 5 },
          cv: { customs: 0.27 },
          wip: { customs: 980, head: 360 },
          route: { customs: 2.4, air: 0.7 }
        },
        warehouse: {
          id: "warehouse",
          name: "海外仓爆仓",
          short: "爆仓",
          node: "overseas",
          icon: "inventory",
          summary: "海外仓上架能力不足，拆柜区积压扩大，建议切换备用仓并增加夜班。",
          multipliers: { overseas: 2.35, customs: 1.08 },
          waits: { overseas: 28 },
          cv: { overseas: 0.34 },
          wip: { overseas: 1260, customs: 260 },
          route: { warehouse: 2.9, lastmile: 0.6 }
        },
        port: {
          id: "port",
          name: "港口拥堵",
          short: "港口",
          node: "head",
          icon: "anchor",
          summary: "头程海运等待上升，低成本路线失去时效优势，系统建议改走空运或铁路中转。",
          multipliers: { head: 1.72 },
          waits: { head: 42 },
          cv: { head: 0.26 },
          wip: { head: 1120 },
          route: { sea: 4.8, port: 3.2 }
        },
        lastmile: {
          id: "lastmile",
          name: "尾程派送延迟",
          short: "尾程",
          node: "lastmile",
          icon: "package_2",
          summary: "尾程派送网络承压，妥投时效被拉长，建议切换区域承运商并提升预约波次。",
          multipliers: { lastmile: 1.85 },
          waits: { lastmile: 18 },
          cv: { lastmile: 0.28 },
          wip: { lastmile: 740 },
          route: { lastmile: 1.8, express: 0.4 }
        }
      };

      const channelProfiles = {
        全部渠道: { lead: 1, cost: 1, cv: 0 },
        空运: { lead: 0.78, cost: 1.34, cv: -0.03 },
        海运: { lead: 1.28, cost: 0.72, cv: 0.07 },
        快递: { lead: 0.7, cost: 1.58, cv: -0.01 }
      };

      const countryProfiles = {
        全部目的地: { lead: 1, risk: 0 },
        美国: { lead: 1.05, risk: 0.04 },
        德国: { lead: 0.96, risk: 0.02 },
        英国: { lead: 1.02, risk: 0.03 },
        日本: { lead: 0.82, risk: -0.02 }
      };

      const navItems = [
        { id: "guide", label: "使用指引", icon: "menu_book" },
        { id: "overview", label: "总览驾驶舱", icon: "dashboard" },
        { id: "leadtime", label: "时效分析", icon: "timer" },
        { id: "bottleneck", label: "瓶颈诊断", icon: "analytics" },
        { id: "routes", label: "路径优化", icon: "route" },
        { id: "exceptions", label: "异常模拟", icon: "warning" },
        { id: "batches", label: "线路观测", icon: "list_alt" },
        { id: "admin", label: "后台管理", icon: "admin_panel_settings" }
      ];

      const apiStageIds = {
        Domestic_PickPack: { id: "domestic", icon: "warehouse" },
        Head_Transit: { id: "head", icon: "flight_takeoff" },
        Customs_Clearance: { id: "customs", icon: "fact_check" },
        Oversea_Inbound: { id: "overseas", icon: "inventory_2" },
        Last_Mile: { id: "lastmile", icon: "local_shipping" }
      };

      function normalizeApiRoute(route) {
        if (!route) return null;
        const legs = (route.legs || []).map((leg) => ({
          from: leg.start_node,
          to: leg.end_node,
          carrier: leg.carrier_name,
          time: leg.time_days,
          cost: leg.cost,
          tag: leg.route_tag
        }));
        return {
          nodes: route.nodes || [],
          route: legs,
          time: route.time_days || 0,
          cost: Math.round(route.cost || 0),
          carriers: route.carriers || []
        };
      }

      function normalizeApiModel(payload) {
        const diagnostics = payload.diagnostics || {};
        const summary = diagnostics.summary || {};
        const routePlan = payload.route_plan || {};
        const hasBusinessData = (summary.total_records || 0) > 0;
        if (!hasBusinessData) {
          return {
            ...emptyModel(false, ""),
            modelMetadata: payload.model_metadata,
            routeMessage: "请先在后台导入你的业务批次数据，系统不会展示公开样本或派生观测。",
            hasBusinessData: false
          };
        }
        const metrics = (diagnostics.stages || []).map((stage) => {
          const meta = apiStageIds[stage.stage_id] || { id: stage.stage_id, icon: "hub" };
          return {
            id: meta.id,
            name: stage.stage_name,
            short: stage.stage_short_name,
            icon: meta.icon,
            target: stage.target_lead_time_hrs,
            lead: stage.avg_lead_time_hrs,
            wait: stage.wait_time_hrs,
            value: stage.value_added_time_hrs,
            capacity: stage.daily_capacity,
            demand: stage.daily_demand,
            load: stage.load_factor,
            takt: stage.takt_time_sec,
            cycle: stage.avg_cycle_time_sec,
            cv: stage.coefficient_of_variation,
            wip: stage.wip,
            status: stage.status
          };
        });
        const bottleneck = metrics.find((stage) => stage.status === "瓶颈") || metrics[0] || stages[0];
        const batches = ((payload.batches || {}).items || []).map((batch) => ({
          id: batch.batch_no,
          channel: batch.channel_type,
          country: batch.destination,
          node: batch.current_node,
          elapsed: batch.elapsed_days,
          eta: batch.eta_days,
          risk: batch.risk_level,
          riskScore: batch.risk_score,
          issue: batch.issue,
          volumeIndex: batch.volume_index || batch.piece_count,
          sourceId: batch.source_id,
          sourceYear: batch.source_year,
          sourceUrl: batch.source_url,
          recordType: batch.record_type,
          evidence: batch.evidence_note
        }));
        const highRisk = batches.filter((batch) => batch.risk === "高风险").length;
        const warnRisk = batches.filter((batch) => batch.risk !== "低风险").length;

        return {
          metrics,
          totalDays: summary.avg_lead_time_days || 0,
          waitHours: summary.avg_wait_time_hrs || 0,
          varRatio: summary.value_added_ratio || 0,
          bottleneck,
          batches,
          highRisk,
          warnRisk,
          tocAdvice: summary.toc_advice,
          baselineDays: payload.baseline?.avg_lead_time_days,
          scenarioSummary: diagnostics.scenario?.summary,
          routeMessage: routePlan.message,
          modelMetadata: payload.model_metadata,
          hasBusinessData,
          routes: {
            best: normalizeApiRoute(routePlan.selected_route),
            fastest: normalizeApiRoute(routePlan.fastest_route),
            cheapest: normalizeApiRoute(routePlan.cheapest_route),
            recommended: normalizeApiRoute(routePlan.recommended_route),
            paths: (routePlan.candidate_routes || []).map(normalizeApiRoute),
            feasibleCount: routePlan.feasible_count || 0,
            fallback: !!routePlan.fallback
          },
          source: "api"
        };
      }

      function useModel(anomalyId, channel, country, maxDays) {
        const [remote, setRemote] = useState({ model: null, loading: false, error: "" });

        useEffect(() => {
          const controller = new AbortController();
          const params = new URLSearchParams({
            channel_type: channel,
            destination: country,
            scenario: anomalyId,
            max_allowed_days: String(maxDays)
          });

          setRemote((state) => ({ ...state, loading: true, error: "" }));
          fetch(`/api/dashboard?${params.toString()}`, { signal: controller.signal })
            .then((response) => {
              if (!response.ok) throw new Error(`API ${response.status}`);
              return response.json();
            })
            .then((payload) => setRemote({ model: normalizeApiModel(payload), loading: false, error: "" }))
            .catch((error) => {
              if (error.name !== "AbortError") {
                setRemote({ model: null, loading: false, error: "后端暂不可用，业务数据暂未加载" });
              }
            });

          return () => controller.abort();
        }, [anomalyId, channel, country, maxDays]);

        return remote.model ? { ...remote.model, loading: remote.loading, error: remote.error } : emptyModel(remote.loading, remote.error);
      }

      function emptyModel(loading, error) {
        const metrics = stages.map((stage) => ({
          ...stage,
          lead: 0,
          wait: 0,
          value: 0,
          demand: 0,
          load: 0,
          takt: 0,
          cycle: 0,
          wip: 0,
          status: "正常"
        }));
        return {
          metrics,
          totalDays: 0,
          waitHours: 0,
          varRatio: 0,
          bottleneck: metrics[0],
          batches: [],
          highRisk: 0,
          warnRisk: 0,
          routes: { best: null, fastest: null, cheapest: null, recommended: null, paths: [], feasibleCount: 0, fallback: false },
          modelMetadata: null,
          hasBusinessData: false,
          source: "api",
          loading,
          error
        };
      }

      function EmptyDataState({ setPage, title = "等待导入你的业务数据" }) {
        return (
          <div className="page-pad">
            <section className="card grid-bg p-8">
              <div className="max-w-3xl">
                <span className="inline-flex h-12 w-12 items-center justify-center rounded-md border border-emerald/40 bg-emerald/10 text-emerald">
                  <Icon name="upload_file" />
                </span>
                <h3 className="mt-5 text-2xl font-black text-text">{title}</h3>
                <p className="mt-3 leading-7 text-muted">
                  主看板已清空公开样本和派生观测。只有你在“后台管理”中导入的 CSV/JSON 业务批次，才会进入交期分析、TOC 瓶颈诊断、异常模拟和线路观测。
                </p>
                <div className="mt-5 grid grid-cols-1 gap-3 md:grid-cols-3">
                  <div className="rounded-md bg-surface-lowest p-4"><p className="font-bold">1. 打开后台管理</p><p className="micro mt-2">填写管理员 Token</p></div>
                  <div className="rounded-md bg-surface-lowest p-4"><p className="font-bold">2. 粘贴业务 CSV</p><p className="micro mt-2">字段包含批次号和节点时间</p></div>
                  <div className="rounded-md bg-surface-lowest p-4"><p className="font-bold">3. 查看诊断</p><p className="micro mt-2">系统按你的数据实时计算</p></div>
                </div>
                {setPage && (
                  <div className="mt-6 flex flex-wrap gap-2">
                    <button className="btn btn-primary" onClick={() => setPage("admin")}><Icon name="admin_panel_settings" />去后台导入</button>
                    <button className="btn" onClick={() => setPage("guide")}><Icon name="menu_book" />查看指引</button>
                  </div>
                )}
              </div>
            </section>
          </div>
        );
      }

      function Icon({ name, className = "" }) {
        return <span className={`material-symbols-outlined ${className}`}>{name}</span>;
      }

      function StatusBadge({ status }) {
        const cls = status === "瓶颈" || status === "高风险" ? "status-bad" : status === "预警" || status === "中风险" ? "status-warn" : "status-normal";
        return <span className={`inline-flex items-center gap-1 rounded-full border px-2 py-1 text-xs font-bold ${cls}`}><span className="status-dot" style={{ background: status === "瓶颈" || status === "高风险" ? colors.bad : status === "预警" || status === "中风险" ? colors.warn : colors.normal }} />{status}</span>;
      }

      function MetricCard({ title, value, suffix, tone = "normal", icon, hint, onClick }) {
        const color = tone === "bad" ? colors.bad : tone === "warn" ? colors.warn : colors.normal;
        return (
          <button onClick={onClick} className="card card-hover w-full p-4 text-left">
            <div className="flex items-start justify-between gap-3">
              <div>
                <p className="micro">{title}</p>
                <div className="mt-2 flex items-baseline gap-1">
                  <span className="mono text-3xl font-black" style={{ color }}>{value}</span>
                  {suffix && <span className="text-sm text-muted">{suffix}</span>}
                </div>
              </div>
              <span className="grid h-9 w-9 place-items-center rounded-md" style={{ background: `${color}1b`, color }}>
                <Icon name={icon} />
              </span>
            </div>
            <div className="mt-4 flex items-center gap-2">
              <div className="bar-track flex-1">
                <div className="bar-fill" style={{ "--w": tone === "bad" ? "92%" : tone === "warn" ? "70%" : "58%", "--c": color }} />
              </div>
              <span className="micro">{hint}</span>
            </div>
          </button>
        );
      }

      function Sidebar({ page, setPage, anomalyId }) {
        return (
          <aside className="sidebar">
            <div className="p-5">
              <div className="flex items-center gap-3">
                <div className="grid h-10 w-10 place-items-center rounded-md bg-emerald text-[#003824]">
                  <Icon name="precision_manufacturing" />
                </div>
                <div>
                  <h1 className="text-lg font-black">精益物流</h1>
                  <p className="micro">决策诊断平台</p>
                </div>
              </div>
            </div>
            <nav className="flex-1 px-3">
              {navItems.map((item) => {
                const active = item.id === page;
                return (
                  <button
                    key={item.id}
                    onClick={() => setPage(item.id)}
                    className={`mb-1 flex w-full items-center gap-3 rounded-md px-4 py-3 text-left text-sm font-bold transition ${active ? "border-l-4 border-emerald bg-surface-high text-emerald" : "text-muted hover:bg-surface-high hover:text-text"}`}
                  >
                    <Icon name={item.icon} />
                    <span>{item.label}</span>
                  </button>
                );
              })}
            </nav>
            <div className="m-4 rounded-md border border-outline bg-surface-lowest p-4">
              <p className="micro">当前场景</p>
              <div className="mt-2 flex items-center gap-2">
                <Icon name={anomalies[anomalyId].icon} className={anomalyId === "none" ? "text-emerald" : "text-rose"} />
                <span className="text-sm font-black">{anomalies[anomalyId].name}</span>
              </div>
            </div>
          </aside>
        );
      }

      function Header({ page, channel, setChannel, country, setCountry, anomalyId, setPage, reset }) {
        const current = navItems.find((item) => item.id === page);
        return (
          <header className="topbar flex items-center justify-between gap-4 px-6">
            <div>
              <p className="micro">精益物流决策看板</p>
              <h2 className="text-xl font-black">{current.label}</h2>
            </div>
            <div className="flex flex-wrap items-center justify-end gap-3">
              <select value={channel} onChange={(event) => setChannel(event.target.value)} className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text">
                {Object.keys(channelProfiles).map((item) => <option key={item}>{item}</option>)}
              </select>
              <select value={country} onChange={(event) => setCountry(event.target.value)} className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text">
                {Object.keys(countryProfiles).map((item) => <option key={item}>{item}</option>)}
              </select>
              <span className={`inline-flex h-9 items-center gap-2 rounded-md border px-3 text-sm font-bold ${anomalyId === "none" ? "status-normal" : "status-bad"}`}>
                <span className="status-dot" style={{ background: anomalyId === "none" ? colors.normal : colors.bad }} />
                {anomalyId === "none" ? "实时诊断中" : "异常联动中"}
              </span>
              {anomalyId !== "none" && <button className="btn" onClick={reset}><Icon name="restart_alt" />恢复基线</button>}
              <button className="btn btn-danger" onClick={() => setPage("exceptions")}><Icon name="bolt" />注入异常</button>
            </div>
          </header>
        );
      }

      function ProcessFlow({ metrics, compact = false }) {
        const maxLead = Math.max(1, ...metrics.map((item) => item.lead));
        return (
          <div className={`grid gap-3 ${compact ? "grid-cols-1" : "grid-cols-1 xl:grid-cols-5"}`}>
            {metrics.map((stage, index) => {
              const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
              return (
                <div key={stage.id} className="card relative overflow-hidden p-4">
                  <div className="flex items-center justify-between">
                    <span className="grid h-9 w-9 place-items-center rounded-md" style={{ background: `${color}1f`, color }}><Icon name={stage.icon} /></span>
                    <StatusBadge status={stage.status} />
                  </div>
                  <h3 className="mt-4 font-black">{stage.name}</h3>
                  <p className="micro mt-1">平均耗时 {fmt.format(stage.lead)} 小时</p>
                  <div className="mt-4 bar-track">
                    <div className="bar-fill" style={{ "--w": pct(stage.lead / maxLead * 100), "--c": color }} />
                  </div>
                  <div className="mt-3 grid grid-cols-2 gap-2 text-xs text-muted">
                    <span>等待 {fmt.format(stage.wait)}h</span>
                    <span>积压 {stage.wip}件</span>
                  </div>
                  {!compact && index < metrics.length - 1 && <div className="absolute right-[-10px] top-1/2 hidden h-5 w-5 rotate-45 border-r border-t border-outline bg-surface-card xl:block" />}
                </div>
              );
            })}
          </div>
        );
      }

      function Radar({ metrics }) {
        const bottleneck = metrics.find((item) => item.status === "瓶颈") || metrics[0] || stages[0];
        const values = [
          clamp(bottleneck.lead / bottleneck.target * 42, 12, 88),
          clamp(bottleneck.load * 64, 18, 92),
          clamp(bottleneck.cv * 125, 16, 90),
          clamp(bottleneck.wip / 16, 20, 94)
        ];
        const points = values.map((value, index) => {
          const angle = Math.PI / 2 + index * Math.PI / 2;
          const radius = value * 0.78;
          return [100 + Math.cos(angle) * radius, 100 - Math.sin(angle) * radius];
        }).map((point) => point.join(",")).join(" ");

        return (
          <svg viewBox="0 0 200 200" className="h-64 w-full">
            {[30, 55, 80].map((r) => <polygon key={r} points={`100,${100 - r} ${100 + r},100 100,${100 + r} ${100 - r},100`} fill="none" stroke="#3c4a42" strokeDasharray="4 5" />)}
            <line x1="100" y1="20" x2="100" y2="180" stroke="#3c4a42" />
            <line x1="20" y1="100" x2="180" y2="100" stroke="#3c4a42" />
            <polygon points={points} fill="rgba(255,120,134,0.22)" stroke="#ff7886" strokeWidth="3" />
            {points.split(" ").map((point) => {
              const [x, y] = point.split(",");
              return <circle key={point} cx={x} cy={y} r="4" fill="#ffb2b7" />;
            })}
            <text x="100" y="14" fill="#bbcabf" fontSize="10" textAnchor="middle">时效</text>
            <text x="187" y="103" fill="#bbcabf" fontSize="10" textAnchor="end">负荷</text>
            <text x="100" y="195" fill="#bbcabf" fontSize="10" textAnchor="middle">波动</text>
            <text x="14" y="103" fill="#bbcabf" fontSize="10">积压</text>
          </svg>
        );
      }

      function Funnel({ metrics }) {
        const max = Math.max(...metrics.map((item) => item.lead));
        const widths = metrics.map((item) => 48 + item.lead / max * 46);
        return (
          <div className="space-y-3">
            {metrics.map((stage, index) => {
              const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
              return (
                <div key={stage.id} className="grid grid-cols-[120px_1fr_90px] items-center gap-3">
                  <div className="flex items-center gap-2 text-sm font-bold"><Icon name={stage.icon} className="text-muted" />{stage.short}</div>
                  <div className="h-10 rounded-md border border-outline bg-surface-lowest p-1">
                    <div className="flex h-full items-center justify-between rounded px-3 text-xs font-bold text-[#07101f]" style={{ width: `${widths[index]}%`, background: color }}>
                      <span>{fmt.format(stage.lead)} 小时</span>
                      <span>{fmt.format(stage.lead / 24)} 天</span>
                    </div>
                  </div>
                  <StatusBadge status={stage.status} />
                </div>
              );
            })}
          </div>
        );
      }

      function WipBars({ metrics }) {
        const max = Math.max(...metrics.map((item) => item.wip));
        return (
          <div className="flex h-56 items-end gap-4 border-b border-l border-outline px-4 pt-5">
            {metrics.map((stage) => {
              const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
              return (
                <div key={stage.id} className="flex flex-1 flex-col items-center gap-2">
                  <span className="mono text-xs" style={{ color }}>{stage.wip}</span>
                  <div className="w-full rounded-t-md" style={{ height: `${stage.wip / max * 170}px`, background: color }} />
                  <span className="text-xs text-muted">{stage.short}</span>
                </div>
              );
            })}
          </div>
        );
      }

      function RouteCard({ title, route, active, fallback }) {
        if (!route) return null;
        return (
          <div className={`card p-4 ${active ? "border-emerald" : ""}`}>
            <div className="flex items-center justify-between gap-3">
              <div>
                <p className="micro">{title}</p>
                <h3 className="mt-1 text-base font-black">{route.nodes.join(" → ")}</h3>
              </div>
              {active && <span className={`rounded-full border px-2 py-1 text-xs font-black ${fallback ? "status-warn" : "status-normal"}`}>{fallback ? "兜底路线" : "推荐路线"}</span>}
            </div>
            <div className="mt-4 grid grid-cols-3 gap-3">
              <div className="rounded-md bg-surface-lowest p-3">
                <p className="micro">预计交期</p>
                <p className="mono text-lg font-black text-emerald">{fmt.format(route.time)} 天</p>
              </div>
              <div className="rounded-md bg-surface-lowest p-3">
                <p className="micro">成本指数</p>
                <p className="mono text-lg font-black text-amber">{route.cost} 点</p>
              </div>
              <div className="rounded-md bg-surface-lowest p-3">
                <p className="micro">承运组合</p>
                <p className="truncate text-sm font-bold">{route.carriers.length} 家</p>
              </div>
            </div>
            <p className="mt-3 text-xs text-muted">{route.carriers.join(" / ")}</p>
          </div>
        );
      }

      function RouteGraph({ route }) {
        const nodes = route?.nodes || ["中国", "香港机场", "美西清关", "美东海外仓"];
        const xGap = 520 / Math.max(1, nodes.length - 1);
        return (
          <svg viewBox="0 0 600 170" className="h-48 w-full rounded-md bg-surface-lowest">
            <defs>
              <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L8,4 L0,8 z" fill="#4edea3" />
              </marker>
            </defs>
            <path d={nodes.map((_, i) => `${i === 0 ? "M" : "L"} ${40 + i * xGap} ${85 + (i % 2 ? -28 : 22)}`).join(" ")} fill="none" stroke="#4edea3" strokeWidth="3" markerEnd="url(#arrow)" />
            {nodes.map((node, index) => {
              const x = 40 + index * xGap;
              const y = 85 + (index % 2 ? -28 : 22);
              return (
                <g key={node}>
                  <circle cx={x} cy={y} r="18" fill="#151b2d" stroke="#4edea3" strokeWidth="2" />
                  <text x={x} y={y + 42} fill="#dce1fb" fontSize="12" textAnchor="middle">{node}</text>
                </g>
              );
            })}
          </svg>
        );
      }

      function TocTable({ metrics }) {
        return (
          <div className="overflow-auto">
            <table className="soft-table w-full min-w-[840px] text-left text-sm">
              <thead className="bg-surface-lowest text-muted">
                <tr>
                  <th className="px-4 py-3">节点</th>
                  <th className="px-4 py-3">节拍时间</th>
                  <th className="px-4 py-3">实际周期</th>
                  <th className="px-4 py-3">变异系数</th>
                  <th className="px-4 py-3">负荷率</th>
                  <th className="px-4 py-3">在制积压</th>
                  <th className="px-4 py-3">诊断状态</th>
                </tr>
              </thead>
              <tbody>
                {metrics.map((stage) => {
                  const color = stage.status === "瓶颈" ? colors.bad : stage.status === "预警" ? colors.warn : colors.normal;
                  return (
                    <tr key={stage.id}>
                      <td className="px-4 py-3 font-bold"><span className="inline-flex items-center gap-2"><Icon name={stage.icon} className="text-muted" />{stage.name}</span></td>
                      <td className="mono px-4 py-3">{fmt.format(stage.takt)} 秒/件</td>
                      <td className="mono px-4 py-3" style={{ color }}>{fmt.format(stage.cycle)} 秒/件</td>
                      <td className="mono px-4 py-3">{fmt.format(stage.cv * 100)}%</td>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                          <div className="bar-track w-24"><div className="bar-fill" style={{ "--w": pct(clamp(stage.load * 100, 0, 120)), "--c": color }} /></div>
                          <span className="mono">{fmt.format(stage.load * 100)}%</span>
                        </div>
                      </td>
                      <td className="mono px-4 py-3">{stage.wip} 件</td>
                      <td className="px-4 py-3"><StatusBadge status={stage.status} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      }

      function Overview({ model, setPage, anomalyId }) {
        if (!model.hasBusinessData) return <EmptyDataState setPage={setPage} />;
        const route = model.routes.best;
        return (
          <div className="page-pad space-y-5">
            <section className="grid grid-cols-1 gap-4 xl:grid-cols-4">
              <MetricCard title="平均全链路交期" value={fmt.format(model.totalDays)} suffix="天" icon="timer" hint="较目标偏差" tone={model.totalDays > 9 ? "bad" : "normal"} onClick={() => setPage("leadtime")} />
              <MetricCard title="增值时间比率" value={fmt.format(model.varRatio)} suffix="%" icon="percent" hint="越高越稳" tone={model.varRatio < 34 ? "warn" : "normal"} onClick={() => setPage("leadtime")} />
              <MetricCard title="当前瓶颈节点" value={model.bottleneck.short} icon="analytics" hint="约束理论判定" tone="bad" onClick={() => setPage("bottleneck")} />
              <MetricCard title="高风险观测" value={model.highRisk} suffix="条" icon="warning" hint={`${model.warnRisk} 条需关注`} tone={model.highRisk > 8 ? "bad" : "warn"} onClick={() => setPage("batches")} />
            </section>

            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1.45fr_0.85fr]">
              <div className="card p-5">
                <div className="mb-4 flex items-center justify-between">
                  <div>
                    <h3 className="panel-title">全链路流程缩略图</h3>
                    <p className="micro">按节点展示耗时、等待、积压与诊断状态</p>
                  </div>
                  <button className="btn" onClick={() => setPage("leadtime")}><Icon name="open_in_new" />查看时效</button>
                </div>
                <ProcessFlow metrics={model.metrics} />
              </div>
              <div className="card p-5">
                <div className="flex items-start justify-between">
                  <div>
                    <h3 className="panel-title">节点脆弱性雷达</h3>
                    <p className="micro">当前约束：{model.bottleneck.name}</p>
                  </div>
                  <StatusBadge status={model.bottleneck.status} />
                </div>
                <Radar metrics={model.metrics} />
              </div>
            </section>

            <section className="grid grid-cols-1 gap-5 xl:grid-cols-[1fr_1fr_0.8fr]">
              <div className="card p-5">
                <h3 className="panel-title">今日诊断结论</h3>
                <p className="mt-4 leading-7 text-sm text-muted">
                  当前系统约束位于<span className="font-black text-rose"> {model.bottleneck.name} </span>。
                  {model.scenarioSummary || anomalies[anomalyId].summary}
                  建议先保护瓶颈节点产能，再调整前序放行节奏。
                </p>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">推荐物流路线</h3>
                <div className="mt-4 rounded-md bg-surface-lowest p-4">
                  <p className="font-black">{route ? route.nodes.join(" → ") : "等待真实数据加载"}</p>
                  <div className="mt-3 grid grid-cols-2 gap-3">
                    <span className="micro">预计 {fmt.format(route?.time || 0)} 天</span>
                    <span className="micro">成本指数 {route?.cost || 0} 点</span>
                  </div>
                </div>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">异常态势</h3>
                <div className="mt-4 space-y-3">
                  {model.metrics.filter((item) => item.status !== "正常").map((item) => (
                    <div key={item.id} className="flex items-center justify-between rounded-md bg-surface-lowest px-3 py-2">
                      <span className="text-sm font-bold">{item.name}</span>
                      <StatusBadge status={item.status} />
                    </div>
                  ))}
                </div>
              </div>
            </section>

            <section className="card p-5">
              <div className="flex flex-wrap items-start justify-between gap-4">
                <div>
                  <h3 className="panel-title">模型依据（非业务数据）</h3>
                  <p className="micro mt-1">{model.modelMetadata?.runtime_sample_policy || "正在加载模型依据"}</p>
                </div>
                <span className="rounded-full border border-emerald/40 bg-emerald/10 px-3 py-1 text-xs font-black text-emerald">{model.modelMetadata?.data_mode || "API 数据"}</span>
              </div>
              <div className="mt-4 grid grid-cols-1 gap-3 xl:grid-cols-3">
                {(model.modelMetadata?.model_references || []).slice(0, 3).map((source) => (
                  <a key={source.ref_id} href={source.url} target="_blank" className="rounded-md border border-outline bg-surface-lowest p-4 transition hover:border-emerald">
                    <p className="text-sm font-black">{source.name}</p>
                    <p className="micro mt-2">算法参考</p>
                    <p className="mt-3 line-clamp-2 text-xs text-muted">{source.use_in_model}</p>
                  </a>
                ))}
              </div>
            </section>
          </div>
        );
      }

      function LeadTimePage({ model, setPage }) {
        if (!model.hasBusinessData) return <EmptyDataState setPage={setPage} title="导入业务批次后才能计算时效" />;
        return (
          <div className="page-pad space-y-5">
            <section className="grid grid-cols-1 gap-4 xl:grid-cols-4">
              <MetricCard title="全链路交期" value={fmt.format(model.totalDays)} suffix="天" icon="schedule" hint="含等待时间" tone={model.totalDays > 9 ? "bad" : "normal"} />
              <MetricCard title="平均等待时间" value={fmt.format(model.waitHours)} suffix="小时" icon="hourglass" hint="非增值耗时" tone={model.waitHours > 56 ? "warn" : "normal"} />
              <MetricCard title="增值时间比率" value={fmt.format(model.varRatio)} suffix="%" icon="functions" hint="运输与处理占比" tone={model.varRatio < 34 ? "warn" : "normal"} />
              <MetricCard title="波动最高节点" value={model.metrics.reduce((a, b) => a.cv > b.cv ? a : b).short} icon="monitoring" hint="按变异系数排序" tone="warn" />
            </section>
            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1fr_0.82fr]">
              <div className="card p-5">
                <h3 className="panel-title">全链路时效漏斗</h3>
                <p className="micro mt-1">国内仓出库至尾程妥投的耗时分布</p>

              </div>
              <div className="card p-5">
                <h3 className="panel-title">节点等待结构</h3>
                <div className="mt-4 space-y-4">
                  {model.metrics.map((stage) => {
                    const waitRatio = stage.wait / stage.lead * 100;
                    const color = waitRatio > 45 ? colors.bad : waitRatio > 32 ? colors.warn : colors.normal;
                    return (
                      <div key={stage.id}>
                        <div className="mb-2 flex justify-between text-sm"><span>{stage.name}</span><span className="mono text-muted">{fmt.format(waitRatio)}%</span></div>
                        <div className="bar-track"><div className="bar-fill" style={{ "--w": pct(waitRatio), "--c": color }} /></div>
                      </div>
                    );

                </div>
              </div>
            </section>
            <section className="card p-5">

                  </thead>
                  <tbody>
                    {model.batches.slice(0, 8).map((batch) => (
                      <tr key={batch.id}>
                        <td className="mono px-4 py-3 font-bold">{batch.id}</td>
                        <td className="px-4 py-3">{batch.channel}</td>
                        <td className="px-4 py-3">{batch.country}</td>
                        <td className="px-4 py-3">{batch.node}</td>
                        <td className="mono px-4 py-3">{fmt.format(batch.elapsed)} 天</td>
                        <td className="px-4 py-3"><StatusBadge status={batch.risk} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        );
      }

      function BottleneckPage({ model, setPage }) {
        if (!model.hasBusinessData) return <EmptyDataState setPage={setPage} title="导入业务批次后才能诊断瓶颈" />;
        return (
          <div className="page-pad space-y-5">
            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1.35fr_0.65fr]">
              <div className="card p-5">
                <div className="mb-4 flex items-center justify-between">
                  <div>
                    <h3 className="panel-title">约束理论诊断表</h3>
                    <p className="micro">以节拍时间、实际周期、变异系数和负荷率共同判定物理瓶颈</p>
                  </div>
                  <StatusBadge status={model.bottleneck.status} />
                </div>
                <TocTable metrics={model.metrics} />
              </div>
              <div className="card p-5">
                <h3 className="panel-title">智能诊断建议</h3>
                <div className="mt-4 rounded-md border border-rose/40 bg-rose/10 p-4">
                  <p className="text-sm leading-7">
                    {model.tocAdvice || <>
                      当前链路瓶颈位于<span className="font-black text-rose"> {model.bottleneck.name} </span>，
                      实际周期为<span className="mono font-black text-rose"> {fmt.format(model.bottleneck.cycle)} 秒/件 </span>，
                      已超过节拍要求。建议提高该节点短班产能，并限制前序节点继续推货。
                    </>}
                  </p>
                </div>
                <div className="mt-4 space-y-3">

      function AdminPage() {
        const [token, setToken] = useState(localStorage.getItem("lean_admin_token") || "");
        const [adminUser, setAdminUser] = useState(localStorage.getItem("lean_admin_user") || "admin");
        const [runtime, setRuntime] = useState(null);
        const [loading, setLoading] = useState(false);
        const [notice, setNotice] = useState("");
        const [error, setError] = useState("");
        const [businessContent, setBusinessContent] = useState([
          "batch_no,channel_type,origin,destination,piece_count,cbm,ts_order_created,ts_domestic_out,ts_head_arrive,ts_customs_clear,ts_oversea_in,ts_last_mile_del",
          "BIZ-SZ-US-001,空运,深圳,美国,42,1.6,2026-05-01T08:00:00,2026-05-01T18:00:00,2026-05-05T09:00:00,2026-05-06T12:00:00,2026-05-07T15:00:00,2026-05-09T11:00:00"
        ].join("\n"));

        const adminHeaders = () => ({
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
          "X-Admin-User": adminUser || "admin"
        });

        const persistToken = () => {
          localStorage.setItem("lean_admin_token", token);
          localStorage.setItem("lean_admin_user", adminUser || "admin");
          setNotice("管理员凭据已保存");
        };

        const loadRuntime = () => {
          if (!token) {
            setError("请先填写管理员 Token");
            return;
          }
          setLoading(true);
          setError("");
          fetch("/api/admin/runtime", { headers: adminHeaders() })
            .then((response) => {
              if (!response.ok) throw new Error(`后台接口 ${response.status}`);
              return response.json();
            })
            .then((payload) => {
              setRuntime(payload);
              setNotice("后台状态已刷新");
            })
            .catch((err) => setError(err.message))
            .finally(() => setLoading(false));
        };

        useEffect(() => {
          if (token) loadRuntime();
        }, []);

        const runAction = (label, request) => {
          setLoading(true);
          setError("");
          request()
            .then((response) => {
              if (!response.ok) throw new Error(`${label}失败：${response.status}`);
              return response.json();
            })
            .then((payload) => {
              setNotice(payload.message || `${label}已完成`);
              loadRuntime();
            })
            .catch((err) => setError(err.message))
            .finally(() => setLoading(false));
        };

        const importBusiness = () => runAction("业务数据导入", () => fetch("/api/admin/data/import/business", {
          method: "POST",
          headers: adminHeaders(),
          body: JSON.stringify({ format: "csv", content: businessContent })
        }));

        const backupNow = () => runAction("备份", () => fetch("/api/admin/backup", { method: "POST", headers: adminHeaders() }));
        const resetIndex = () => runAction("重建数据索引", () => fetch("/api/admin/data/reset", { method: "POST", headers: adminHeaders() }));

        const saveParameter = (key, value) => runAction("模型参数保存", () => fetch(`/api/admin/model-parameters/${key}`, {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({ value })
        }));

        const saveCapacity = (nodeId, dailyCapacity, targetLeadTime) => runAction("节点产能保存", () => fetch(`/api/admin/node-capacities/${nodeId}`, {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({ daily_capacity: Number(dailyCapacity), target_lead_time: Number(targetLeadTime) })
        }));

        const saveSchedule = (scheduleId, enabled) => runAction("定时任务保存", () => fetch(`/api/admin/schedules/${scheduleId}`, {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({ enabled })
        }));

        const runSchedule = (scheduleId) => runAction("定时任务执行", () => fetch(`/api/admin/schedules/${scheduleId}/run`, {
          method: "POST",
          headers: adminHeaders()
        }));

        return (
          <div className="page-pad space-y-5">
            <section className="card p-5">
              <div className="flex flex-wrap items-end justify-between gap-4">
                <div>
                  <h3 className="panel-title">后台管理</h3>
                  <p className="micro mt-1">生产配置、真实业务数据导入、模型校准、审计和试运行任务</p>
                </div>
                <div className="flex flex-wrap gap-2">
                  <input value={adminUser} onChange={(event) => setAdminUser(event.target.value)} placeholder="操作者" className="h-9 w-28 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                  <input value={token} onChange={(event) => setToken(event.target.value)} type="password" placeholder="管理员 Token" className="h-9 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                  <button className="btn" onClick={persistToken}><Icon name="key" />保存</button>
                  <button className="btn btn-primary" onClick={loadRuntime} disabled={loading}><Icon name="sync" />刷新</button>
                </div>
              </div>
              {(notice || error) && (
                <div className={`mt-4 rounded-md border px-4 py-3 text-sm ${error ? "border-rose/50 bg-rose/10 text-rose" : "border-emerald/40 bg-emerald/10 text-emerald"}`}>
                  {error || notice}
                </div>
              )}
            </section>

            <section className="grid grid-cols-1 gap-5 xl:grid-cols-4">

              <MetricCard title="业务批次" value={runtime?.business_records?.total?.count || 0} suffix="条" icon="dataset" hint="仅统计你导入的数据" tone="normal" />
              <MetricCard title="导入任务" value={runtime?.imports?.length || 0} suffix="次" icon="cloud_download" hint="最近任务记录" tone="warn" />
              <MetricCard title="审计事件" value={runtime?.audit_logs?.length || 0} suffix="条" icon="history" hint={runtime?.auth_mode || "Bearer Token"} tone="normal" />
            </section>

            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1fr_1fr]">

                  <table className="soft-table w-full min-w-[860px] text-left text-sm">
                    <thead className="bg-surface-lowest text-muted">
                      <tr><th className="px-4 py-3">时间</th><th className="px-4 py-3">操作者</th><th className="px-4 py-3">动作</th><th className="px-4 py-3">对象</th><th className="px-4 py-3">状态</th></tr>
                    </thead>
                    <tbody>
                      {(runtime?.audit_logs || []).map((log) => (
                        <tr key={log.log_id}>
                          <td className="px-4 py-3 text-muted">{log.created_at}</td>
                          <td className="px-4 py-3 font-bold">{log.actor_id}</td>
                          <td className="mono px-4 py-3">{log.action}</td>
                          <td className="px-4 py-3">{log.target_type}{log.target_id ? ` / ${log.target_id}` : ""}</td>
                          <td className="px-4 py-3">{log.status}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          </div>
        );
      }

      function CapacityRow({ node, saveCapacity }) {
        const [dailyCapacity, setDailyCapacity] = useState(node.daily_capacity);
        const [targetLeadTime, setTargetLeadTime] = useState(node.target_lead_time);
        return (
          <div className="rounded-md border border-outline bg-surface-lowest p-4">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="text-sm font-black text-text">{node.node_name}</p>
                <p className="mono mt-1 text-xs text-muted">{node.node_id}</p>
              </div>
              <div className="flex flex-wrap gap-2">
                <input value={dailyCapacity} onChange={(event) => setDailyCapacity(event.target.value)} type="number" className="h-9 w-28 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                <input value={targetLeadTime} onChange={(event) => setTargetLeadTime(event.target.value)} type="number" step="0.1" className="h-9 w-28 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                <button className="btn" onClick={() => saveCapacity(node.node_id, dailyCapacity, targetLeadTime)}><Icon name="tune" />校准</button>
              </div>
            </div>
          </div>
        );
      }

      function ScheduleRow({ schedule, saveSchedule, runSchedule, loading }) {
        const enabled = Boolean(Number(schedule.enabled));
        return (
          <div className="rounded-md border border-outline bg-surface-lowest p-4">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="mono text-sm font-black text-emerald">{schedule.schedule_id}</p>
                <p className="mt-1 text-xs text-muted">{schedule.notes}</p>
                <p className="mono mt-2 text-xs text-muted">{schedule.cron_hint} / {schedule.next_run_hint}</p>
              </div>
              <div className="flex gap-2">
                <button className={`btn ${enabled ? "btn-primary" : ""}`} onClick={() => saveSchedule(schedule.schedule_id, !enabled)}>
                  <Icon name={enabled ? "toggle_on" : "toggle_off"} />{enabled ? "启用" : "停用"}
                </button>
                <button className="btn" onClick={() => runSchedule(schedule.schedule_id)} disabled={loading}><Icon name="play_arrow" />执行</button>
              </div>
            </div>
          </div>
        );
      }

      function ParameterRow({ param, saveParameter }) {
        const [value, setValue] = useState(param.value);
        return (
          <div className="rounded-md border border-outline bg-surface-lowest p-4">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="mono text-sm font-black text-emerald">{param.key}</p>
                <p className="mt-1 text-xs text-muted">{param.description}</p>
              </div>
              <div className="flex gap-2">
                <input value={value} onChange={(event) => setValue(event.target.value)} className="h-9 w-24 rounded-md border border-outline bg-surface-low px-3 text-sm text-text" />
                <button className="btn" onClick={() => saveParameter(param.key, value)}><Icon name="save" />保存</button>
              </div>
            </div>
          </div>
        );
      }

      function GuidePage({ setPage }) {
        const workflow = [
          { icon: "vpn_key", title: "准备后台权限", text: "进入后台管理，填写管理员 Token 和操作者名称。Token 只保存在本机浏览器，不会展示在页面上。" },
          { icon: "table_view", title: "整理业务数据", text: "把 WMS/TMS/ERP 或 Excel 导出的运单整理成 CSV/JSON，至少包含批次号、渠道、目的地、件数、体积、创建时间和妥投时间。" },
          { icon: "upload_file", title: "导入业务批次", text: "在后台“数据源导入”粘贴 CSV/JSON 并点击导入。只有 source_id=BUSINESS_UPLOAD 的数据会进入主看板。" },
          { icon: "tune", title: "校准模型参数", text: "按你的业务口径调整 TOC 阈值、路线成本/时效权重、节点日产能和目标处理时长。" },
          { icon: "analytics", title: "查看诊断结果", text: "总览、时效、瓶颈、路径和异常模拟会根据你导入的数据实时计算，不再展示公开样本。" },
          { icon: "verified", title: "试运行与留痕", text: "每次导入、参数调整、备份和定时任务都会进入审计日志，便于后续复盘和交接。" }
        ];
        const fields = [
          ["batch_no", "批次/运单唯一编号", "必填"],
          ["channel_type", "空运、海运、快递等渠道", "建议"],
          ["origin / destination", "起点和目的地", "必填"],
          ["piece_count / cbm", "件数和体积", "必填"],
          ["ts_order_created", "订单创建时间", "必填"],
          ["ts_domestic_out", "国内仓出库时间", "建议"],
          ["ts_head_arrive", "头程到达时间", "建议"],
          ["ts_customs_clear", "清关完成时间", "建议"],
          ["ts_oversea_in", "海外仓入库/上架时间", "建议"],
          ["ts_last_mile_del", "尾程妥投时间", "必填"]
        ];
        const modules = [
          { icon: "dashboard", title: "总览驾驶舱", text: "看平均交期、增值比、瓶颈节点和高风险批次，适合每日晨会快速判断链路状态。" },
          { icon: "timer", title: "时效分析", text: "把全链路拆成国内仓、头程、清关、海外仓、尾程，区分等待时间和增值时间。" },
          { icon: "analytics", title: "瓶颈诊断", text: "用节拍时间、实际周期、CV 和负荷率诊断物理瓶颈，并给出 TOC 建议。" },
          { icon: "route", title: "路径优化", text: "根据期望交期约束，在候选路线里做成本/时效折中；无解时走最快兜底路线。" },
          { icon: "warning", title: "异常模拟", text: "注入清关、爆仓、港口拥堵、尾程延迟，观察瓶颈迁移和路径推荐变化。" },
          { icon: "admin_panel_settings", title: "后台管理", text: "负责业务导入、参数校准、产能校准、备份、定时任务和审计日志。" }
        ];
        const principles = [
          { title: "精益物流", text: "识别等待、返工和排队，把全链路交期拆成增值时间与非增值等待时间。" },
          { title: "TOC 约束理论", text: "整条链路的产出由最弱节点决定，诊断目标是找到当前真正限制系统的节点。" },
          { title: "Takt Time", text: "用可用工作时间除以需求量，得到系统应满足的节拍，再和实际周期对比。" },
          { title: "CV 变异系数", text: "用标准差除以均值衡量波动，波动越大，节点越容易形成隐性排队和失控风险。" },
          { title: "运筹优化", text: "把路线视为图，用交期约束下的最低成本路径和综合评分路径推荐承运方案。" },
          { title: "异常压力测试", text: "通过改变节点耗时、波动和 WIP，观察瓶颈是否迁移，提前准备备用策略。" }
        ];
        const sampleCsv = [
          "batch_no,channel_type,origin,destination,piece_count,cbm,ts_order_created,ts_domestic_out,ts_head_arrive,ts_customs_clear,ts_oversea_in,ts_last_mile_del",
          "BIZ-SZ-US-001,空运,深圳,美国,42,1.6,2026-05-01T08:00:00,2026-05-01T18:00:00,2026-05-05T09:00:00,2026-05-06T12:00:00,2026-05-07T15:00:00,2026-05-09T11:00:00"
        ].join("\n");
        return (
          <div className="page-pad space-y-5">
            <section className="card grid-bg p-6">
              <div className="flex flex-wrap items-end justify-between gap-5">
                <div className="max-w-3xl">
                  <p className="micro">从空看板到可运营试运行</p>
                  <h3 className="mt-2 text-3xl font-black text-text">系统使用步骤指引</h3>
                  <p className="mt-3 leading-7 text-muted">
                    这个系统现在只展示你导入的业务批次。公开数据、开源项目和 LPI 指标只用于模型依据说明，不进入主看板运营统计。
                  </p>
                </div>
                <div className="flex gap-2">
                  <button className="btn btn-primary" onClick={() => setPage("admin")}><Icon name="upload_file" />去导入数据</button>
                  <button className="btn" onClick={() => setPage("overview")}><Icon name="dashboard" />看总览</button>
                </div>
              </div>
            </section>

            <section className="grid grid-cols-1 gap-4 xl:grid-cols-3">
              {workflow.map((step, index) => (
                <div key={step.title} className="card p-5">
                  <div className="flex items-center gap-3">
                    <span className="grid h-10 w-10 place-items-center rounded-md bg-emerald/10 text-emerald"><Icon name={step.icon} /></span>
                    <div>
                      <p className="micro">步骤 {index + 1}</p>
                      <h4 className="font-black">{step.title}</h4>
                    </div>
                  </div>
                  <p className="mt-4 text-sm leading-7 text-muted">{step.text}</p>
                </div>
              ))}
            </section>

            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1fr_1fr]">
              <div className="card p-5">
                <h3 className="panel-title">业务 CSV 字段说明</h3>
                <div className="mt-4 overflow-auto">
                  <table className="soft-table w-full min-w-[680px] text-left text-sm">
                    <thead className="bg-surface-lowest text-muted">
                      <tr><th className="px-4 py-3">字段</th><th className="px-4 py-3">含义</th><th className="px-4 py-3">要求</th></tr>
                    </thead>
                    <tbody>
                      {fields.map((field) => (
                        <tr key={field[0]}>
                          <td className="mono px-4 py-3 font-black text-emerald">{field[0]}</td>
                          <td className="px-4 py-3">{field[1]}</td>
                          <td className="px-4 py-3"><StatusBadge status={field[2] === "必填" ? "预警" : "正常"} /></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">可直接粘贴的 CSV 示例</h3>
                <pre className="mono mt-4 overflow-auto rounded-md border border-outline bg-surface-lowest p-4 text-xs leading-6 text-muted">{sampleCsv}</pre>
                <div className="mt-4 rounded-md bg-surface-lowest p-4 text-sm leading-7 text-muted">
                  如果你只有创建时间和妥投时间，也可以先导入；系统会按全链路时长派生中间节点时间。正式试运行建议补齐每个节点时间。
                </div>
              </div>
            </section>

            <section className="card p-5">
              <h3 className="panel-title">每个页面怎么看</h3>
              <div className="mt-4 grid grid-cols-1 gap-3 xl:grid-cols-3">
                {modules.map((item) => (
                  <button key={item.title} className="rounded-md border border-outline bg-surface-lowest p-4 text-left transition hover:border-emerald" onClick={() => setPage(navItems.find((nav) => nav.label === item.title)?.id || "guide")}>
                    <div className="flex items-center gap-3">
                      <Icon name={item.icon} className="text-emerald" />
                      <span className="font-black">{item.title}</span>
                    </div>
                    <p className="mt-3 text-sm leading-6 text-muted">{item.text}</p>
                  </button>
                ))}
              </div>
            </section>

            <section className="grid grid-cols-1 gap-5 2xl:grid-cols-[1.1fr_0.9fr]">
              <div className="card p-5">
                <h3 className="panel-title">系统运用的原理</h3>
                <div className="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
                  {principles.map((item) => (
                    <div key={item.title} className="rounded-md bg-surface-lowest p-4">
                      <p className="font-black text-text">{item.title}</p>
                      <p className="mt-2 text-sm leading-6 text-muted">{item.text}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card p-5">
                <h3 className="panel-title">导入后验收清单</h3>
                <div className="mt-4 space-y-3">
                  {["总览 KPI 不再为 0", "线路观测出现你的批次号", "瓶颈诊断表出现 5 个节点", "路径优化能随交期滑块变化", "异常注入后瓶颈节点会迁移", "后台审计日志记录导入与参数变更"].map((item) => (
                    <div key={item} className="flex items-center gap-3 rounded-md bg-surface-lowest p-3 text-sm">
                      <Icon name="check_circle" className="text-emerald" />
                      <span>{item}</span>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </div>
        );
      }

      function App() {
        const [page, setPage] = useState("overview");
        const [channel, setChannel] = useState("全部渠道");
        const [country, setCountry] = useState("全部目的地");
        const [anomalyId, setAnomalyId] = useState("none");
        const [maxDays, setMaxDays] = useState(8);
        const [toast, setToast] = useState("");
        const model = useModel(anomalyId, channel, country, maxDays);

        const inject = (id) => {
          setAnomalyId(id);
          setToast(`${anomalies[id].name}已注入，诊断模型正在联动更新`);
          window.clearTimeout(window.__toastTimer);
          window.__toastTimer = window.setTimeout(() => setToast(""), 2400);
        };

        const reset = () => {
          setAnomalyId("none");
          setToast("已恢复基线场景");
          window.clearTimeout(window.__toastTimer);
          window.__toastTimer = window.setTimeout(() => setToast(""), 1800);
        };

        return (
          <div className="app-shell">
            <Sidebar page={page} setPage={setPage} anomalyId={anomalyId} />
            <div className="main-area">
              <Header page={page} channel={channel} setChannel={setChannel} country={country} setCountry={setCountry} anomalyId={anomalyId} setPage={setPage} reset={reset} />
              <main>
                {page === "guide" && <GuidePage setPage={setPage} />}
                {page === "overview" && <Overview model={model} setPage={setPage} anomalyId={anomalyId} />}
                {page === "leadtime" && <LeadTimePage model={model} setPage={setPage} />}
                {page === "bottleneck" && <BottleneckPage model={model} setPage={setPage} />}
                {page === "routes" && <RoutesPage model={model} maxDays={maxDays} setMaxDays={setMaxDays} setPage={setPage} />}
                {page === "exceptions" && <ExceptionsPage anomalyId={anomalyId} inject={inject} reset={reset} model={model} setPage={setPage} />}
                {page === "batches" && <BatchesPage model={model} setPage={setPage} />}
                {page === "admin" && <AdminPage />}
              </main>
            </div>
            {toast && <div className="toast"><div className="flex items-center gap-2"><Icon name={anomalyId === "none" ? "check_circle" : "warning"} /><span className="font-bold">{toast}</span></div></div>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
